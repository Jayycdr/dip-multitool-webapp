<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}DIP MultiTool{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0c10;
      --surface:   #111318;
      --card:      #161a22;
      --border:    #232836;
      --accent:    #00e5ff;
      --accent2:   #7c3aed;
      --green:     #00ff88;
      --red:       #ff4466;
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --radius:    12px;
      --radius-lg: 20px;
      --mono:      'Space Mono', monospace;
      --sans:      'Syne', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── SCANLINE OVERLAY ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,229,255,0.015) 2px,
        rgba(0,229,255,0.015) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── NAV ── */
    nav {
      background: rgba(17,19,24,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      font-family: var(--mono);
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 0.08em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-logo::before {
      content: '◈';
      font-size: 1.2rem;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .nav-links {
      display: flex;
      gap: 0.5rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.8rem;
      font-family: var(--mono);
      letter-spacing: 0.05em;
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid transparent;
      transition: all 0.2s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(0,229,255,0.06);
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      margin-bottom: 2.5rem;
    }

    .page-tag {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--accent);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .page-tag::before { content: '//'; color: var(--muted); }

    .page-title {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .page-title span { color: var(--accent); }

    .page-desc {
      margin-top: 0.6rem;
      color: var(--muted);
      font-size: 0.95rem;
      font-family: var(--mono);
      line-height: 1.6;
    }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.4;
    }

    .card-title {
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    /* ── DROP ZONE ── */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(0,229,255,0.04);
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
      display: block;
    }

    .drop-label {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--muted);
    }

    .drop-label strong {
      color: var(--accent);
    }

    .drop-hint {
      font-size: 0.7rem;
      color: var(--border);
      margin-top: 0.4rem;
      font-family: var(--mono);
    }

    /* ── PREVIEW ── */
    .preview-box {
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      position: relative;
    }

    .preview-box img {
      width: 100%;
      max-height: 320px;
      object-fit: contain;
      background: #080a0e;
      display: block;
    }

    .preview-label {
      position: absolute;
      top: 10px; left: 10px;
      background: rgba(0,0,0,0.75);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 10px;
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .preview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    /* ── INPUTS ── */
    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
      display: block;
    }

    input[type="text"], textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,229,255,0.1);
    }

    textarea { resize: vertical; min-height: 120px; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0.75rem 1.75rem;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: white;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .btn:active::after { opacity: 0.08; }

    .btn-primary {
      background: var(--accent);
      color: #000;
    }

    .btn-primary:hover {
      box-shadow: 0 0 24px rgba(0,229,255,0.4);
      transform: translateY(-1px);
    }

    .btn-outline {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
    }

    .btn-outline:hover {
      background: rgba(0,229,255,0.08);
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      color: var(--text);
      border-color: var(--muted);
    }

    .btn-green {
      background: var(--green);
      color: #000;
    }

    .btn-green:hover {
      box-shadow: 0 0 24px rgba(0,255,136,0.35);
      transform: translateY(-1px);
    }

    .btn-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-top: 1.5rem;
    }

    /* ── OCR OUTPUT ── */
    .ocr-output {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      font-family: var(--mono);
      font-size: 0.85rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 380px;
      overflow-y: auto;
    }

    .copy-btn {
      position: absolute;
      top: 10px; right: 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
      z-index: 2;
    }

    .copy-btn:hover { color: var(--accent); border-color: var(--accent); }
    .copy-btn.copied { color: var(--green); border-color: var(--green); }

    /* ── STAT PILLS ── */
    .stats-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin: 1.25rem 0;
    }

    .stat-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-family: var(--mono);
      font-size: 0.75rem;
    }

    .stat-pill .val {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
      display: block;
    }

    .stat-pill .lbl {
      color: var(--muted);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .stat-pill.green .val { color: var(--green); }

    /* ── MESSAGE OUTPUT ── */
    .message-output {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--green);
      border-radius: var(--radius);
      padding: 1.25rem;
      font-family: var(--mono);
      font-size: 0.9rem;
      line-height: 1.6;
      word-break: break-word;
      position: relative;
    }

    /* ── DIVIDER ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    /* ── ALERTS ── */
    .alert {
      padding: 0.85rem 1.1rem;
      border-radius: var(--radius);
      font-family: var(--mono);
      font-size: 0.8rem;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 1.25rem;
    }

    .alert-info {
      background: rgba(0,229,255,0.07);
      border: 1px solid rgba(0,229,255,0.2);
      color: var(--accent);
    }

    /* ── GRID LAYOUTS ── */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      align-items: start;
    }

    @media (max-width: 640px) {
      .two-col { grid-template-columns: 1fr; }
      .preview-grid { grid-template-columns: 1fr; }
      nav { padding: 0 1rem; }
      .nav-links { display: none; }
      main { padding: 2rem 1rem; }
    }

    /* ── SPINNER ── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(0,229,255,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn.loading .spinner { display: inline-block; }
    .btn.loading .btn-text { display: none; }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 2rem;
      border-top: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* ── FADE IN ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card, .page-header { animation: fadeUp 0.4s ease both; }
    .card:nth-child(2) { animation-delay: 0.08s; }
    .card:nth-child(3) { animation-delay: 0.16s; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

<nav>
  <a class="nav-logo" href="/">DIP MULTITOOL</a>
  <ul class="nav-links">
    <li><a href="/encode" {% if request.path == '/encode' %}class="active"{% endif %}>Steg Encode</a></li>
    <li><a href="/decode" {% if request.path == '/decode' %}class="active"{% endif %}>Steg Decode</a></li>
    <li><a href="/ocr"    {% if request.path == '/ocr'    %}class="active"{% endif %}>OCR</a></li>
    <li><a href="/compress" {% if request.path == '/compress' %}class="active"{% endif %}>Compress</a></li>
  </ul>
</nav>

<main>
  {% block content %}{% endblock %}
</main>

<footer>
  ◈ DIP MultiTool — Digital Image Processing Suite &nbsp;·&nbsp; All operations run locally
</footer>

<script>
  // Drag-and-drop highlight
  document.querySelectorAll('.drop-zone').forEach(zone => {
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('drag-over'); });

    const input = zone.querySelector('input[type="file"]');
    if (input) {
      input.addEventListener('change', () => {
        const file = input.files[0];
        if (file) {
          zone.querySelector('.drop-label').innerHTML = `<strong>${file.name}</strong>`;
          zone.querySelector('.drop-icon').textContent = '✓';
          // Live preview
          const reader = new FileReader();
          reader.onload = e => {
            let preview = document.getElementById('input-preview-img');
            if (preview) { preview.src = e.target.result; preview.closest('.preview-box').style.display='block'; }
          };
          reader.readAsDataURL(file);
        }
      });
    }
  });

  // Copy button
  document.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = document.getElementById(btn.dataset.target);
      if (target) {
        navigator.clipboard.writeText(target.innerText).then(() => {
          btn.classList.add('copied');
          btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
          setTimeout(() => {
            btn.classList.remove('copied');
            btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy`;
          }, 2200);
        });
      }
    });
  });

  // Submit loading state
  document.querySelectorAll('form').forEach(form => {
    form.addEventListener('submit', () => {
      const btn = form.querySelector('.btn-primary');
      if (btn) btn.classList.add('loading');
    });
  });
</script>

</body>
</html>
